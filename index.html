<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<link rel="icon" href="https://pbs.twimg.com/profile_images/1485964577858899971/mTMMXgP__400x400.jpg" type="image/jpeg" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Coscienza di Ismaele.V00.06</title>
<style>
:root {
  --primary-color: #252525;
  --accent-color: #4a90e2;
  --glass-bg: rgba(255, 255, 255, 0.75);
  --glass-border: rgba(255, 255, 255, 0.4);
  --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  margin: 0; padding: 0; height: 100vh;
  background: url('https://images.unsplash.com/photo-1505506874110-6a7a69069a08?fm=jpg&q=60&w=3000&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NHx8c3BhemlvfGVufDB8fDB8fHww') center/cover fixed;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: #333; overflow: hidden;
}

#chatContainer {
  display: flex; flex-direction: column;
  width: 95%; max-width: 900px; height: 90vh;
  background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border); border-radius: 20px;
  overflow: hidden; box-shadow: var(--shadow); position: relative; z-index: 10;
}

#chatBox {
  flex: 1 1 auto; padding: 20px; overflow-y: auto;
  display: flex; flex-direction: column; gap: 12px;
  position: relative; scroll-behavior: smooth;
}

#chatBox p {
  margin: 0; padding: 12px 16px; border-radius: 18px; max-width: 80%;
  display: flex; align-items: flex-start; gap: 10px; word-break: break-word;
  font-size: 15px; line-height: 1.5; position: relative; z-index: 2;
  box-shadow: 0 2px 5px rgba(0,0,0,0.05); animation: popIn 0.3s ease;
}

@keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

.user { background: #333; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px !important; flex-direction: row-reverse; }
.bot { background: #fff; align-self: flex-start; border-bottom-left-radius: 4px !important; border: 1px solid rgba(0,0,0,0.05); }

.avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 2px solid #fff; flex-shrink: 0; }

#inputContainer {
  display: flex; flex-direction: column; background: rgba(255,255,255,0.9);
  padding: 15px; gap: 10px; border-top: 1px solid rgba(0,0,0,0.1); z-index: 20;
}

.input-wrapper { display: flex; gap: 10px; width: 100%; align-items: center; }

#userInput {
  flex: 1; padding: 12px 15px; border: 1px solid #ccc; outline: none;
  font-size: 16px; border-radius: 25px; background: #f9f9f9;
}

#micBtn { background: none; border: none; font-size: 22px; cursor: pointer; transition: 0.2s; padding: 5px; }
#micBtn.recording { color: #ff4b2b; animation: pulse 1.5s infinite; }

@keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

#sendBtn {
  padding: 10px 20px; border: none; background: #000; color: #fff;
  font-weight: bold; border-radius: 25px; cursor: pointer;
}

#sendBtn:disabled { background: #ccc; }

footer { font-size: 11px; color: #888; text-align: center; }
footer a { color: #555; font-weight: bold; text-decoration: none; }

#scrollDownBtn {
  position: absolute; bottom: 100px; right: 30px; width: 40px; height: 40px;
  border-radius: 50%; background: #fff; border: none; font-size: 20px;
  cursor: pointer; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  display: none; align-items: center; justify-content: center;
}

.thinking-container { display: flex; gap: 4px; padding: 5px 0; }
.dot { width: 8px; height: 8px; background-color: #666; border-radius: 50%; animation: thinkingWave 1.3s linear infinite; }
.dot:nth-child(2) { animation-delay: -1.1s; }
.dot:nth-child(3) { animation-delay: -0.9s; }
@keyframes thinkingWave { 0%, 60%, 100% { transform: translateY(0); opacity: 0.6; } 30% { transform: translateY(-7px); opacity: 1; } }

@media screen and (min-width: 800px) {
  #chatContainer { flex-direction: row; }
  #chatBox { flex: 2; border-right: 1px solid rgba(0,0,0,0.1); }
  #inputContainer { flex: 1; border-top: none; justify-content: center; }
  .input-wrapper { flex-direction: column; }
  #userInput, #sendBtn, #micBtn { width: 100%; }
}
</style>
</head>
<body>

<div id="chatContainer">
  <div id="chatBox"></div>
  <div id="inputContainer">
    <footer>Progetto di <a href="https://www.instagram.com/ismaelemaione" target="_blank">Ismaele Maione</a></footer>
    <div class="input-wrapper">
        <input type="text" id="userInput" placeholder="Parla con la coscienza..." autocomplete="off" />
        <button id="micBtn" title="Detta testo">🎤</button>
        <button id="sendBtn" onclick="sendMessage()">Invia</button>
    </div>
  </div>
</div>

<button id="scrollDownBtn" onclick="scrollToBottom()">⬇️</button>

<script>
const userAvatar='https://pbs.twimg.com/profile_images/1485964577858899971/mTMMXgP__400x400.jpg';
const botAvatar=userAvatar;
let chatHistory=[];
const chatBox=document.getElementById("chatBox");
const inputEl=document.getElementById("userInput");
const micBtn=document.getElementById("micBtn");

// --- FUNZIONE SINTESI VOCALE (BOT PARLA) ---
function speak(text) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel(); // Ferma letture precedenti
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'it-IT';
        msg.rate = 0.9; // Leggermente più lento per enfasi
        msg.pitch = 0.8; // Tono più basso/serio
        window.speechSynthesis.speak(msg);
    }
}

// --- FUNZIONE RICONOSCIMENTO VOCALE (USER PARLA) ---
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SpeechRecognition) {
    const recognition = new SpeechRecognition();
    recognition.lang = 'it-IT';
    
    micBtn.addEventListener('click', () => {
        try { recognition.start(); } catch(e) { recognition.stop(); }
    });

    recognition.onstart = () => micBtn.classList.add('recording');
    recognition.onresult = (event) => { inputEl.value = event.results[0][0].transcript; };
    recognition.onend = () => micBtn.classList.remove('recording');
} else {
    micBtn.style.display = "none";
}

function appendMessage(sender, text, isHtml = false){
  const p = document.createElement("p");
  p.className = sender;
  const avatar = document.createElement("img");
  avatar.className = "avatar";
  avatar.src = sender === "user" ? userAvatar : botAvatar;
  const contentDiv = document.createElement("div");
  if(isHtml) contentDiv.innerHTML = text; else contentDiv.textContent = text;
  p.appendChild(avatar);
  p.appendChild(contentDiv);
  chatBox.appendChild(p);
  scrollToBottom();
  if(sender !== 'bot-thinking') chatHistory.push({sender, text});
  return p;
}

function showThinking() {
    return appendMessage("bot", `<div class="thinking-container"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`, true);
}

async function sendMessage(initialMessages=null){
  const sendBtn=document.getElementById("sendBtn");
  const userMessage=initialMessages?null:inputEl.value.trim();
  if(!initialMessages && !userMessage) return;
  if(!initialMessages) appendMessage("user", userMessage);
  
  inputEl.value="";
  inputEl.disabled = sendBtn.disabled = true;

  const recentMessages=chatHistory.slice(-5).map(m=>({role:m.sender==="user"?"user":"assistant", content:m.text}));
  const messagesPayload = initialMessages || [
    { role: "system", content: "Sei la coscienza di Ismaele. Diretta, cruda, no emoji. Parla come una voce interna." },
    ...recentMessages,
    { role: "user", content: userMessage }
  ];

  const thinkingElement = showThinking();

  try {
    const response = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messagesPayload })
    });
    
    chatBox.removeChild(thinkingElement);
    const data = await response.json();
    
    if(data.choices && data.choices.length > 0){
      const botText = data.choices[0].message.content;
      appendMessage("bot", botText);
      speak(botText); // <--- IL BOT PARLA
    }
  } catch(e) {
    if(thinkingElement.parentNode) chatBox.removeChild(thinkingElement);
    appendMessage("bot", "Errore nella sinapsi.");
  } finally {
    inputEl.disabled = sendBtn.disabled = false;
    inputEl.focus();
    scrollToBottom();
  }
}

function scrollToBottom(){ setTimeout(() => { chatBox.scrollTo({top:chatBox.scrollHeight, behavior:'smooth'}); }, 100); }
inputEl.addEventListener('keypress',e=>{if(e.key==="Enter") sendMessage();});
window.addEventListener('DOMContentLoaded',()=> sendMessage([{role:"system",content:"Sei la coscienza di Ismaele."}, {role:"user",content:"Ci sei?"}]));
</script>
</body>
</html>
